<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaTab Spike - OTF Rendering Test</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text: #e0e0e0;
            --text-muted: #8899aa;
            --accent: #e94560;
            --accent-secondary: #533483;
            --border: #2a3a5c;
            --success: #4ecca3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 { font-size: 20px; font-weight: 600; color: var(--accent); }

        header .badge {
            font-size: 11px;
            padding: 2px 8px;
            background: var(--accent-secondary);
            border-radius: 10px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .controls .separator {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        .controls label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, button {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
        }

        select:hover, button:hover { border-color: var(--accent); }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 500;
        }

        button.primary:hover { opacity: 0.9; }

        .status {
            margin-left: auto;
            font-size: 13px;
            color: var(--text-muted);
        }

        .status.ready { color: var(--success); }
        .status.error { color: var(--accent); }

        /* Warnings */
        .warnings {
            padding: 8px 24px;
            background: #2a1a00;
            border-bottom: 1px solid #5a3a00;
            font-size: 13px;
            color: #ffaa33;
            display: none;
        }

        .warnings.visible { display: block; }

        /* AlphaTab container */
        .at-wrap {
            position: relative;
            margin: 24px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            min-height: 400px;
        }

        .at-content {
            position: relative;
            overflow: auto;
            min-height: 400px;
        }

        /* Player bar */
        .at-player-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin: 0 24px 12px;
        }

        .at-player-bar button {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; padding: 0;
        }

        .at-player-bar .tempo-control {
            display: flex; align-items: center; gap: 8px;
        }

        .at-player-bar .tempo-control label { font-size: 13px; color: var(--text-muted); }

        .at-player-bar input[type="range"] { width: 120px; accent-color: var(--accent); }

        .at-player-bar .time-display {
            font-family: monospace; font-size: 14px;
            color: var(--text-muted); min-width: 100px;
        }

        /* Debug panel */
        .debug-panel {
            margin: 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .debug-panel summary { padding: 12px 16px; cursor: pointer; font-size: 14px; color: var(--text-muted); }

        .debug-panel pre {
            max-height: 400px; overflow: auto;
            padding: 16px; font-size: 12px; line-height: 1.5;
            background: #111; color: #0f0; margin: 0;
        }

        .loading-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9);
            font-size: 16px; color: #333; z-index: 10;
        }

        .loading-overlay.hidden { display: none; }

        /* Track list */
        .track-list {
            display: flex; gap: 8px;
            padding: 12px 24px; flex-wrap: wrap;
        }

        .track-list button { font-size: 12px; padding: 4px 12px; }

        .track-list button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>AlphaTab Spike</h1>
        <span class="badge">Phase 0</span>
    </header>

    <div class="controls">
        <select id="tab-select">
            <option value="">Select a tab...</option>
            <option value="data/tabs/salt-creek-banjo.otf.json">Salt Creek (Banjo)</option>
            <option value="data/tabs/red-haired-boy-banjo.otf.json">Red Haired Boy (Banjo)</option>
            <option value="data/tabs/soldiers-joy-banjo.otf.json">Soldiers Joy (Tenor Banjo)</option>
            <option value="data/tabs/foggy-mountain-breakdown-mandolin.otf.json">Foggy Mountain Breakdown (Mandolin)</option>
            <option value="data/tabs/jerusalem-ridge-ensemble-ensemble.otf.json">Jerusalem Ridge (Ensemble)</option>
            <option value="data/tabs/liberty-banjo.otf.json">Liberty (Banjo)</option>
            <option value="data/tabs/whiskey-before-breakfast-banjo.otf.json">Whiskey Before Breakfast (Banjo)</option>
            <option value="data/tabs/earls-breakdown-banjo.otf.json">Earl's Breakdown (Banjo)</option>
            <option value="data/tabs/dixie-breakdown-banjo.otf.json">Dixie Breakdown (Banjo)</option>
            <option value="data/tabs/ground-speed-banjo.otf.json">Ground Speed (Banjo)</option>
        </select>

        <div class="separator"></div>

        <label>Display:</label>
        <select id="display-mode">
            <option value="tabs">Tab Only</option>
            <option value="score tabs" selected>Notation + Tab</option>
            <option value="score">Notation Only</option>
        </select>

        <div class="separator"></div>

        <button id="btn-tex">Debug: alphaTex</button>
        <span id="status" class="status">Loading AlphaTab...</span>
    </div>

    <div id="warnings" class="warnings"></div>

    <div id="track-list" class="track-list"></div>

    <div class="at-wrap">
        <div id="loading" class="loading-overlay">Loading...</div>
        <div class="at-content">
            <div id="alphaTab"></div>
        </div>
    </div>

    <div id="player-bar" class="at-player-bar" style="display:none;">
        <button id="btn-play" title="Play/Pause">&#9654;</button>
        <button id="btn-stop" title="Stop">&#9632;</button>
        <span id="time-display" class="time-display">0:00 / 0:00</span>
        <div class="tempo-control">
            <label>Tempo:</label>
            <input type="range" id="tempo-slider" min="0.25" max="2" step="0.05" value="1">
            <span id="tempo-display">100%</span>
        </div>
    </div>

    <details class="debug-panel">
        <summary>Debug: alphaTex Output</summary>
        <pre id="debug-tex">Load a tab to see the alphaTex output...</pre>
    </details>

    <script type="module">
        import { otfToAlphaTex } from './js/alphatab/otf-to-tex.js';

        let api = null;
        let currentOtf = null;
        let currentUrl = null;
        let alphaTabReady = false;

        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loading');
        const debugTexEl = document.getElementById('debug-tex');
        const tabSelect = document.getElementById('tab-select');
        const displayMode = document.getElementById('display-mode');
        const trackListEl = document.getElementById('track-list');
        const playerBar = document.getElementById('player-bar');
        const warningsEl = document.getElementById('warnings');

        function setStatus(msg, cls = '') {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + cls;
        }

        function showLoading(msg) {
            loadingEl.textContent = msg;
            loadingEl.classList.remove('hidden');
        }

        function hideLoading() {
            loadingEl.classList.add('hidden');
        }

        function showWarnings(warnings) {
            if (warnings.length === 0) {
                warningsEl.classList.remove('visible');
                return;
            }
            warningsEl.innerHTML = warnings.map(w => `&#9888; ${w}`).join('<br>');
            warningsEl.classList.add('visible');
        }

        /**
         * Analyze OTF data for potential issues.
         */
        function analyzeOtf(otf) {
            const warnings = [];

            // Check for unusually high fret numbers (TEF parser bugs)
            for (const trackId of Object.keys(otf.notation)) {
                const measures = otf.notation[trackId];
                for (const m of measures) {
                    for (const e of m.events) {
                        for (const n of e.notes) {
                            if (n.f > 17) {
                                warnings.push(`Suspicious fret ${n.f} on string ${n.s} in track "${trackId}" measure ${m.measure} (likely TEF parser bug, see issue #164)`);
                                return warnings; // Only report first
                            }
                        }
                    }
                }
            }

            // Flag time signature issues (see GitHub issue #165)
            if (otf.metadata?.time_signature === '2/4') {
                warnings.push('Time signature is 2/4 — likely a TEF parser bug, should be 2/2 (see issue #165)');
            }

            return warnings;
        }

        // Initialize AlphaTab
        async function initAlphaTab() {
            try {
                showLoading('Loading AlphaTab library...');

                const alphaTabModule = await import(
                    'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.mjs'
                );
                window.alphaTab = alphaTabModule;

                setStatus('AlphaTab loaded, ready', 'ready');
                alphaTabReady = true;
                hideLoading();

                const el = document.getElementById('alphaTab');
                el.innerHTML = '<div style="padding:40px;color:#999;text-align:center;">Select a tab from the dropdown to render it with AlphaTab</div>';

            } catch (err) {
                console.error('Failed to load AlphaTab:', err);
                setStatus('Failed to load AlphaTab: ' + err.message, 'error');
                hideLoading();
            }
        }

        // Load and render an OTF file
        async function loadTab(url) {
            if (!alphaTabReady) {
                alert('AlphaTab is still loading...');
                return;
            }

            try {
                showLoading('Fetching tab...');
                setStatus('Loading...', '');
                currentUrl = url;

                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                currentOtf = await response.json();

                renderCurrentOtf();

            } catch (err) {
                console.error('Error loading tab:', err);
                setStatus('Error: ' + err.message, 'error');
                hideLoading();
            }
        }

        // Render with current settings
        function renderCurrentOtf() {
            if (!currentOtf || !alphaTabReady) return;

            try {
                showLoading('Converting OTF → alphaTex...');

                // Analyze for issues
                const warnings = analyzeOtf(currentOtf);
                showWarnings(warnings);

                // Convert with current display mode
                const staveProfile = displayMode.value;
                const tex = otfToAlphaTex(currentOtf, { staveProfile });
                debugTexEl.textContent = tex;

                console.log('alphaTex output:', tex);
                console.log('Display mode:', staveProfile);

                showLoading('Rendering with AlphaTab...');

                // Destroy previous API instance
                if (api) {
                    api.destroy();
                    api = null;
                }

                // Set alphaTex content and create API
                const container = document.getElementById('alphaTab');
                container.textContent = tex;

                api = new alphaTab.AlphaTabApi(container, {
                    core: {
                        tex: true,
                        fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/font/',
                    },
                    display: {
                        layoutMode: alphaTab.LayoutMode.Page,
                    },
                    player: {
                        enablePlayer: true,
                        enableCursor: true,
                        enableUserInteraction: true,
                        soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2',
                        scrollElement: document.querySelector('.at-content'),
                    },
                });

                api.renderFinished.on(() => {
                    hideLoading();
                    const title = currentOtf?.metadata?.title?.trim() || 'Unknown';
                    const trackCount = currentOtf?.tracks?.length || 0;
                    const ts = currentOtf?.metadata?.time_signature || '?';
                    setStatus(`${title} | ${trackCount} track${trackCount !== 1 ? 's' : ''} | ${ts}`, 'ready');
                    updateTrackList();
                    playerBar.style.display = 'flex';
                });

                api.error.on((err) => {
                    console.error('AlphaTab error:', err);
                    setStatus('Render error: ' + (err.message || String(err)), 'error');
                    hideLoading();
                });

                api.playerStateChanged.on((args) => {
                    const btn = document.getElementById('btn-play');
                    btn.innerHTML = args.state === 1 ? '&#9646;&#9646;' : '&#9654;';
                });

                api.playerPositionChanged.on((args) => {
                    document.getElementById('time-display').textContent =
                        `${formatTime(args.currentTime)} / ${formatTime(args.endTime)}`;
                });

                api.playerReady.on(() => {
                    console.log('Player ready');
                });

            } catch (err) {
                console.error('Error rendering:', err);
                setStatus('Error: ' + err.message, 'error');
                hideLoading();
            }
        }

        function formatTime(ms) {
            const sec = Math.floor(ms / 1000);
            return `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`;
        }

        function updateTrackList() {
            trackListEl.innerHTML = '';
            if (!api || !api.score || !api.score.tracks) return;

            const tracks = api.score.tracks;
            if (tracks.length <= 1) return;

            tracks.forEach((track, i) => {
                const btn = document.createElement('button');
                btn.textContent = track.name || `Track ${i + 1}`;
                btn.className = api.renderTracks.indexOf(track) >= 0 ? 'active' : '';
                btn.onclick = () => {
                    api.renderTracks = [track];
                    updateTrackList();
                };
                trackListEl.appendChild(btn);
            });

            const allBtn = document.createElement('button');
            allBtn.textContent = 'All Tracks';
            allBtn.className = api.renderTracks.length === tracks.length ? 'active' : '';
            allBtn.onclick = () => {
                api.renderTracks = [...tracks];
                updateTrackList();
            };
            trackListEl.appendChild(allBtn);
        }

        // Event listeners
        tabSelect.addEventListener('change', () => {
            const url = tabSelect.value;
            if (url) loadTab(url);
        });

        // Re-render when display mode changes
        displayMode.addEventListener('change', () => {
            if (currentOtf) renderCurrentOtf();
        });

        document.getElementById('btn-tex').addEventListener('click', () => {
            document.querySelector('.debug-panel').open = !document.querySelector('.debug-panel').open;
        });

        document.getElementById('btn-play').addEventListener('click', () => {
            if (api) api.playPause();
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            if (api) api.stop();
        });

        document.getElementById('tempo-slider').addEventListener('input', (e) => {
            const speed = parseFloat(e.target.value);
            document.getElementById('tempo-display').textContent = Math.round(speed * 100) + '%';
            if (api) api.playbackSpeed = speed;
        });

        // Start
        initAlphaTab();
    </script>
</body>
</html>
